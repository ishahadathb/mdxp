name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm pack

      # Use the tag's section from CHANGELOG.md as the release notes;
      # fall back to GitHub's auto-generated notes if there isn't one.
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag' CHANGELOG.md > notes.md
          if grep -q '[^[:space:]]' notes.md; then
            echo "flags=--notes-file notes.md" >> "$GITHUB_OUTPUT"
          else
            echo "flags=--generate-notes" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in *-*) PRERELEASE="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            $PRERELEASE \
            ${{ steps.notes.outputs.flags }} \
            mdxplore-*.tgz
