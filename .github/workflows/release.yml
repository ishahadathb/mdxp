name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm pack

      - name: Determine tag from package.json
        id: tag
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Use the version's section from CHANGELOG.md as the release notes;
      # fall back to GitHub's auto-generated notes if there isn't one.
      - name: Extract release notes
        id: notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag' CHANGELOG.md > notes.md
          if grep -q '[^[:space:]]' notes.md; then
            echo "flags=--notes-file notes.md" >> "$GITHUB_OUTPUT"
          else
            echo "flags=--generate-notes" >> "$GITHUB_OUTPUT"
          fi

      # Creates the tag at the dispatched commit if it doesn't exist yet;
      # an existing tag (e.g. pushed by npm version) is reused as-is.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          PRERELEASE=""
          case "$TAG" in *-*) PRERELEASE="--prerelease";; esac
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            $PRERELEASE \
            ${{ steps.notes.outputs.flags }} \
            mdxplore-*.tgz
